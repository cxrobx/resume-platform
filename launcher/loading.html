<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #888; }
    .dots span {
      animation: blink 1.4s infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0 } 40% { opacity: 1 } }
  </style>
</head>
<body>
  <div class="title">Resume Editor</div>
  <div class="subtitle">Starting servers<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
</body>
</html>
