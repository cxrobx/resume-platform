<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .title { font-size: 16px; font-weight: 600; color: #ff453a; }
    .subtitle { font-size: 13px; color: #888; text-align: center; line-height: 1.5; max-width: 280px; }
  </style>
</head>
<body>
  <div class="title">Failed to start</div>
  <div class="subtitle">One or more servers did not start in time. Check that the Python venv and npm are set up, then relaunch.</div>
</body>
</html>
